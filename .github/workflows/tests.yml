name: OkoZnaniy Tests

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: okoznaniy_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend test suite
        env:
          DEBUG: 'False'
          SECRET_KEY: test-secret-key
          ALLOWED_HOSTS: localhost,127.0.0.1,testserver
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/okoznaniy_test
          POSTGRES_DB: okoznaniy_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          DB_HOST: localhost
          DB_PORT: 5432
          REDIS_URL: redis://localhost:6379/0
        run: |
          python manage.py test \
            apps.users \
            apps.orders \
            apps.chat \
            apps.experts \
            apps.shop \
            apps.arbitration \
            apps.catalog \
            apps.regression_tests \
            -v 2 --no-input

  frontend-e2e:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: okoznaniy_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend-react/package-lock.json

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install frontend dependencies
        working-directory: frontend-react
        run: npm ci

      - name: Install Playwright browser
        working-directory: frontend-react
        run: npx playwright install --with-deps chromium

      - name: Run frontend E2E suite
        working-directory: frontend-react
        env:
          CI: 'true'
          DEBUG: 'False'
          SECRET_KEY: test-secret-key
          ALLOWED_HOSTS: localhost,127.0.0.1,testserver
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/okoznaniy_test
          POSTGRES_DB: okoznaniy_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          DB_HOST: localhost
          DB_PORT: 5432
          REDIS_URL: redis://localhost:6379/0
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:5173
          PLAYWRIGHT_API_URL: http://127.0.0.1:8000
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend-react/playwright-report
          if-no-files-found: ignore
