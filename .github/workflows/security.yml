name: Security Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '17 4 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  python-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
      - run: python -m pip install --upgrade pip pip-audit bandit
      - run: pip-audit -r requirements.txt
      - name: Static security scan
        run: bandit -r apps config -x '*/migrations/*,*/tests.py,*test*.py' -ll -s B324

  frontend-security:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-react
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend-react/package-lock.json
      - run: npm ci
      - run: npm audit --omit=dev --audit-level=high
      - run: npm run build

  secret-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Reject common committed secret patterns
        shell: bash
        run: |
          set -euo pipefail
          if git grep -nE '(ghp_[A-Za-z0-9]{20,}|BEGIN (RSA |OPENSSH |EC )?PRIVATE KEY|AKIA[0-9A-Z]{16})' -- . ':!*.lock'; then
            echo 'Potential secret committed to repository'
            exit 1
          fi
