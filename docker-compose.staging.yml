name: okoznaniy-staging

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: oko_staging
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: staging-only-password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d oko_staging"]
      interval: 3s
      timeout: 3s
      retries: 20
    tmpfs:
      - /var/lib/postgresql/data
    networks: [staging]

  redis:
    image: redis:7-alpine
    command: redis-server --save '' --appendonly no
    networks: [staging]

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://postgres:staging-only-password@postgres:5432/oko_staging
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: staging-ephemeral-secret-key-not-for-production
      DEBUG: "False"
      DJANGO_ENV: staging
      ALLOWED_HOSTS: localhost,127.0.0.1,backend,nginx
      FRONTEND_URL: http://localhost:18080
      EMAIL_BACKEND: django.core.mail.backends.locmem.EmailBackend
      CREATE_TEST_USERS: "true"
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_started }
    networks: [staging]

  frontend:
    build:
      context: ./frontend-react
      dockerfile: Dockerfile.prod
    networks: [staging]

  nginx:
    image: nginx:alpine
    ports:
      - "127.0.0.1:18080:80"
    volumes:
      - ./docker/nginx/staging.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend: { condition: service_started }
      frontend: { condition: service_started }
    networks: [staging]

networks:
  staging:
